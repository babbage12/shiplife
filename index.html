            function createMusicalNote(type, x, delay, scale) {
                const note = new THREE.Group();
                note.userData.delay = delay;
                note.userData.baseZ = -0.5;
                note.userData.targetZ = 0.3;
                note.userData.baseY = -0.5;
                note.userData.targetY = 0.3 + Math.random() * 0.4;
                note.userData.targetScale = scale;
                note.userData.floatOffset = Math.random() * Math.PI * 2;
                note.userData.floatSpeed = 0.5 + Math.random() * 0.5;
                
                if (type === 'quarter') {
                    // Quarter note - filled oval + stem
                    const noteHead = new THREE.Mesh(
                        new THREE.CircleGeometry(0.06, 16),
                        noteMat
                    );
                    noteHead.scale.set(1.3, 1, 1);
                    noteHead.rotation.z = -0.3;
                    note.add(noteHead);
                    
                    // Stem
                    const stem = new THREE.Mesh(
                        new THREE.PlaneGeometry(0.02, 0.25),
                        noteMat
                    );
                    stem.position.set(0.06, 0.12, 0);
                    note.add(stem);
                    
                } else if (type === 'eighth') {
                    // Eighth note - filled oval + stem + flag
                    const noteHead = new THREE.Mesh(
                        new THREE.CircleGeometry(0.05, 16),
                        noteMat
                    );
                    noteHead.scale.set(1.3, 1, 1);
                    noteHead.rotation.z = -0.3;
                    note.add(noteHead);
                    
                    // Stem
                    const stem = new THREE.Mesh(
                        new THREE.PlaneGeometry(0.02, 0.22),
                        noteMat
                    );
                    stem.position.set(0.05, 0.11, 0);
                    note.add(stem);
                    
                    // Flag
                    const flagShape = new THREE.Shape();
                    flagShape.moveTo(0, 0);
                    flagShape.quadraticCurveTo(0.08, -0.03, 0.1, -0.1);
                    flagShape.lineTo(0.08, -0.08);
                    flagShape.quadraticCurveTo(0.05, -0.02, 0, 0);
                    const flag = new THREE.Mesh(
                        new THREE.ShapeGeometry(flagShape),
                        noteMat
                    );
                    flag.position.set(0.06, 0.22, 0);
                    note.add(flag);
                    
                } else if (type === 'double') {
                    // Double eighth notes
                    for (let i = 0; i < 2; i++) {
                        const head = new THREE.Mesh(
                            new THREE.CircleGeometry(0.04, 16),
                            noteMat
                        );
                        head.scale.set(1.3, 1, 1);
                        head.rotation.z = -0.3;
                        head.position.x = i * 0.12;
                        note.add(head);
                        
                        const stem = new THREE.Mesh(
                            new THREE.PlaneGeometry(0.015, 0.18),
                            noteMat
                        );
                        stem.position.set(i * 0.12 + 0.04, 0.09, 0);
                        note.add(stem);
                    }
                    // Beam connecting
                    const beam = new THREE.Mesh(
                        new THREE.PlaneGeometry(0.14, 0.025),
                        noteMat
                    );
                    beam.position.set(0.06, 0.18, 0);
                    note.add(beam);
                    
                } else if (type === 'treble') {
                    // Simplified treble clef
                    const clefMat = new THREE.MeshBasicMaterial({ 
                        color: 0xffd700,
                        side: THREE.DoubleSide
                    });
                    
                    // Main spiral body (simplified as curves)
                    const shape = new THREE.Shape();
                    shape.moveTo(0, -0.15);
                    shape.quadraticCurveTo(0.1, -0.1, 0.08, 0);
                    shape.quadraticCurveTo(0.06, 0.1, 0, 0.15);
                    shape.quadraticCurveTo(-0.08, 0.2, -0.05, 0.25);
                    shape.quadraticCurveTo(0, 0.3, 0.05, 0.25);
                    shape.quadraticCurveTo(0.1, 0.15, 0.05, 0.05);
                    shape.lineTo(0.03, 0.05);
                    shape.quadraticCurveTo(0.07, 0.12, 0.03, 0.2);
                    shape.quadraticCurveTo(-0.02, 0.25, -0.03, 0.2);
                    shape.quadraticCurveTo(-0.05, 0.15, 0, 0.1);
                    shape.quadraticCurveTo(0.04, 0.05, 0.02, -0.05);
                    shape.quadraticCurveTo(-0.02, -0.08, -0.02, -0.12);
                    shape.lineTo(0, -0.15);
                    
                    const clef = new THREE.Mesh(
                        new THREE.ShapeGeometry(shape),
                        clefMat
                    );
                    clef.scale.setScalar(1.5);
                    note.add(clef);
                }
                
                note.scale.setScalar(0.01);
                note.position.set(x, note.userData.baseY, note.userData.baseZ);
                note.visible = false;
                
                return note;
            }
            
            // Create variety of musical notes
            const note1 = createMusicalNote('quarter', -0.4, 0, 1.8);
            const note2 = createMusicalNote('eighth', 0.5, 100, 1.6);
            const note3 = createMusicalNote('double', -0.2, 200, 1.4);
            const note4 = createMusicalNote('quarter', 0.3, 150, 1.5);
            const note5 = createMusicalNote('treble', 0, 300, 1.2);
            const note6 = createMusicalNote('eighth', -0.5, 250, 1.3);
            const note7 = createMusicalNote('quarter', 0.45, 350, 1.4);
            const note8 = createMusicalNote('double', 0.15, 400, 1.1);
            
            window.musicalNotes = [note1, note2, note3, note4, note5, note6, note7, note8];
            window.musicalNotes.forEach(n => door2Scene.add(n));
            
            window.door2MusicAnimStart = 0;
        }
        
        function renderDoor2Frame() {
            if (!door2Renderer) return;
            
            const time = Date.now();
            const doorBaseX = -0.7;
            
            // Animation phases for watertight door
            if (door2AnimPhase === 'knock') {
                // Phase 1: Lever turns (unlocking mechanism)
                const elapsed = time - door2AnimStart;
                if (elapsed < 600) {
                    const progress = elapsed / 600;
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    // Lever rotates 180 degrees
                    if (door2LeverGroup) {
                        door2LeverGroup.rotation.z = easeOut * Math.PI;
                    }
                } else {
                    door2AnimPhase = 'turn';
                    door2AnimStart = time;
                }
            } else if (door2AnimPhase === 'turn') {
                // Phase 2: Bar slides/retracts
                const elapsed = time - door2AnimStart;
                if (elapsed < 500) {
                    const progress = elapsed / 500;
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    // Bar slides to the side (retracting)
                    if (door2BarGroup) {
                        door2BarGroup.position.x = 1.0 + easeOut * 0.4;
                        door2BarGroup.scale.x = 1 - easeOut * 0.3;
                    }
                } else {
                    door2AnimPhase = 'swing';
                    door2AnimStart = time;
                }
            } else if (door2AnimPhase === 'swing') {
                const elapsed = time - door2AnimStart;
                if (elapsed < 1000) {
                    const progress = elapsed / 1000;
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    const bounce = Math.sin(progress * Math.PI * 2) * 0.03 * (1 - progress);
                    // Heavy door swings open slowly
                    door2Group.rotation.y = (easeOut + bounce) * -1.2;
                    
                    // Show stage backdrop
                    if (progress > 0.2 && window.door2StagePlane) {
                        window.door2StagePlane.visible = true;
                        if (window.door2Vignette) window.door2Vignette.visible = true;
                    }
                    
                    // Start music animation
                    if (progress > 0.3 && window.door2MusicAnimStart === 0) {
                        window.door2MusicAnimStart = time;
                    }
                } else {
                    door2Group.rotation.y = -1.2;
                    door2AnimPhase = 'open';
                    door2IsOpen = true;
                }
            }
            
            // Animate musical notes floating out
            if (window.door2MusicAnimStart > 0 && window.musicalNotes) {
                const musicElapsed = time - window.door2MusicAnimStart;
                
                window.musicalNotes.forEach((note, i) => {
                    const noteElapsed = musicElapsed - note.userData.delay;
                    
                    if (noteElapsed > 0) {
                        note.visible = true;
                        const popDuration = 600;
                        const progress = Math.min(noteElapsed / popDuration, 1);
                        
                        // Bouncy pop out
                        let ease;
                        if (progress < 1) {
                            const t = progress;
                            ease = 1 - Math.pow(1 - t, 3) * Math.cos(t * Math.PI * 1.5) * (1 - t);
                            ease = Math.min(1.1, ease);
                        } else {
                            ease = 1;
                        }
                        
                        // Pop forward and up
                        note.position.z = note.userData.baseZ + (note.userData.targetZ - note.userData.baseZ) * Math.min(ease, 1);
                        note.position.y = note.userData.baseY + (note.userData.targetY - note.userData.baseY) * Math.min(ease, 1);
                        
                        // Scale up
                        const scaleEase = 1 - Math.pow(1 - Math.min(progress, 1), 2);
                        note.scale.setScalar(note.userData.targetScale * scaleEase);
                        
                        // Continuous floating and rotating once popped
                        if (progress >= 1) {
                            const floatTime = (noteElapsed - popDuration) * 0.001;
                            note.position.y = note.userData.targetY + Math.sin(floatTime * note.userData.floatSpeed + note.userData.floatOffset) * 0.1;
                            note.position.x += Math.sin(floatTime * 0.3 + i) * 0.001;
                            note.rotation.z = Math.sin(floatTime * 0.5 + note.userData.floatOffset) * 0.2;
                        }
                    }
                });
            }
            
            // Idle brass glow pulse
            if (!door2IsOpen && door2AnimPhase === 'idle') {
                const pulse = Math.sin(time * 0.003) * 0.15 + 0.85;
                door2MetalMat.emissiveIntensity = 0.2 * pulse;
            }
            
            door2Renderer.render(door2Scene, door2Camera);
            
            if (door2Texture) {
                door2Texture.needsUpdate = true;
            }
        }
        
        function resetDoor2Animation() {
            door2IsOpen = false;
            door2AnimPhase = 'idle';
            
            if (door2Group) {
                door2Group.rotation.y = 0;
                door2Group.position.z = 0;
                door2Group.position.x = -0.7;
            }
            if (door2LeverGroup) {
                door2LeverGroup.rotation.z = 0;
            }
            if (door2BarGroup) {
                door2BarGroup.position.x = 1.0;
                door2BarGroup.scale.x = 1;
            }
            if (window.door2StagePlane) {
                window.door2StagePlane.visible = false;
            }
            if (window.door2Vignette) {
                window.door2Vignette.visible = false;
            }
            if (window.musicalNotes) {
                window.musicalNotes.forEach(note => {
                    note.visible = false;
                    note.position.y = note.userData.baseY;
                    note.position.z = note.userData.baseZ;
                    note.scale.setScalar(0.01);
                    note.rotation.z = 0;
                });
            }
            window.door2MusicAnimStart = 0;
        }
        
        function triggerDoor2Animation() {
            if (door2AnimPhase !== 'idle' && door2AnimPhase !== 'open') return;
            
            if (door2AnimPhase === 'open') {
                resetDoor2Animation();
                return;
            }
            
            door2AnimPhase = 'knock';
            door2AnimStart = Date.now();
        }

        function createMarkers() {
            locations.forEach((loc, index) => {
                const position = latLonToVector3(loc.coords[0], loc.coords[1], 1.0);
                const config = getIconConfig(loc.title);
                
                // Size - doors are larger
                const baseSize = loc.isDoor ? 0.045 : 0.032;
                
                let sprite;
                
                // Special handling for Door #1 (Toledo) - 3D animated door
                if (loc.title === "Toledo, Ohio") {
                    // Initialize the 3D door scene
                    initDoor1Icon();
                    
                    // Create texture from the door canvas
                    door1Texture = new THREE.CanvasTexture(door1Canvas);
                    door1Texture.needsUpdate = true;
                    
                    const spriteMaterial = new THREE.SpriteMaterial({
                        map: door1Texture,
                        transparent: true
                    });
                    sprite = new THREE.Sprite(spriteMaterial);
                    door1Sprite = sprite;
                    
                // Special handling for Door #2 (Darwin) - Wooden door with music
                } else if (loc.title === "Darwin, Australia") {
                    initDoor2Icon();
                    
                    door2Texture = new THREE.CanvasTexture(door2Canvas);
                    door2Texture.needsUpdate = true;
                    
                    const spriteMaterial = new THREE.SpriteMaterial({
                        map: door2Texture,
                        transparent: true
                    });
                    sprite = new THREE.Sprite(spriteMaterial);
                    door2Sprite = sprite;
                    
                } else {
                    // Regular 2D canvas icons for other locations
                    const canvas = document.createElement('canvas');
                    canvas.width = 128;
                    canvas.height = 128;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.clearRect(0, 0, 128, 128);
                    
                    const cx = 64, cy = 64;
                    
                    // Outer glow for doors only
                    if (loc.isDoor) {
                        const glowGrad = ctx.createRadialGradient(cx, cy, 35, cx, cy, 62);
                        glowGrad.addColorStop(0, 'rgba(212, 165, 116, 0.6)');
                        glowGrad.addColorStop(1, 'rgba(212, 165, 116, 0)');
                        ctx.fillStyle = glowGrad;
                        ctx.beginPath();
                        ctx.arc(cx, cy, 62, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    // Background circle
                    ctx.fillStyle = 'rgba(10, 22, 40, 0.92)';
                    ctx.beginPath();
                    ctx.arc(cx, cy, 40, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Border ring
                    ctx.strokeStyle = config.color;
                    ctx.lineWidth = loc.isDoor ? 4 : 3;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 40, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    // Draw the icon
                    const iconCanvas = document.createElement('canvas');
                    iconCanvas.width = 64;
                    iconCanvas.height = 64;
                    renderSidebarIcon(iconCanvas, config);
                    ctx.drawImage(iconCanvas, cx - 32, cy - 32);
                    
                    const texture = new THREE.CanvasTexture(canvas);
                    const spriteMaterial = new THREE.SpriteMaterial({
                        map: texture,
                        transparent: true
                    });
                    sprite = new THREE.Sprite(spriteMaterial);
                }
                
                // Position sprite above surface
                const direction = position.clone().normalize();
                sprite.position.copy(position).add(direction.multiplyScalar(0.015));
                sprite.scale.set(baseSize * 2, baseSize * 2, 1);
                
                // Store data on sprite for click handling
                sprite.userData = loc;
                sprite.userData.baseSize = baseSize;
                sprite.userData.iconConfig = config;
                
                globe.add(sprite);
                markers.push(sprite);
            });
        }

        function buildLocationList() {
            const list = document.getElementById('locationList');
            
            // Doors first
            const doors = locations.filter(l => l.isDoor);
            const others = locations.filter(l => !l.isDoor);
            
            [...doors, ...others].forEach(loc => {
                const config = getIconConfig(loc.title);
                
                const item = document.createElement('div');
                item.className = `location-item ${loc.isDoor ? 'door' : ''}`;
                item.setAttribute('data-style', config.style);
                
                // Create icon container
                const iconDiv = document.createElement('div');
                iconDiv.className = 'icon';
                
                // Create canvas for custom icon
                const canvas = document.createElement('canvas');
                canvas.width = 64;
                canvas.height = 64;
                renderSidebarIcon(canvas, config);
                iconDiv.appendChild(canvas);
                
                // Create name
                const nameDiv = document.createElement('div');
                nameDiv.className = 'name';
                nameDiv.textContent = loc.title;
                
                item.appendChild(iconDiv);
                item.appendChild(nameDiv);
                
                item.onclick = () => {
                    skipPanelOpen = true; // User must click icon to open story
                    focusLocation(loc);
                    closeMobileMenu();
                };
                list.appendChild(item);
            });
            
            // Update locations count in panel hint
            const countEl = document.getElementById('locationsCount');
            if (countEl) {
                countEl.textContent = locations.length + ' places';
            }
        }

        function focusLocation(loc) {
            const lon = loc.coords[1]; // longitude (negative = west)
            const lat = loc.coords[0]; // latitude (positive = north)
            
            // CALIBRATED VALUES (sorted by longitude):
            // Toledo:       lon=-83.54,  Y=-0.10
            // Búzios:       lon=-41.89,  Y=-0.87
            // Marseille:    lon=5.37,    Y=-1.65
            // Portofino:    lon=9.21,    Y=4.60
            // Rome:         lon=12.50,   Y=4.50
            // Malta:        lon=14.51,   Y=4.42
            // Darwin:       lon=130.85,  Y=2.44
            // Sydney:       lon=151.21,  Y=2.10
            // Brisbane:     lon=153.03,  Y=8.30
            // Milford:      lon=167.90,  Y=8.10
            // Auckland:     lon=174.78,  Y=8.01
            // Tauranga:     lon=176.17,  Y=7.93
            // Napier:       lon=176.91,  Y=7.90
            
            let targetY;
            
            if (lon <= -83.54) {
                // West of Toledo - extrapolate
                const slope = (-0.87 - (-0.10)) / (-41.89 - (-83.54));
                targetY = -0.10 + (lon - (-83.54)) * slope;
            } else if (lon <= -41.89) {
                // Toledo to Búzios
                const t = (lon - (-83.54)) / (-41.89 - (-83.54));
                targetY = -0.10 + t * (-0.87 - (-0.10));
            } else if (lon <= 5.37) {
                // Búzios to Marseille
                const t = (lon - (-41.89)) / (5.37 - (-41.89));
                targetY = -0.87 + t * (-1.65 - (-0.87));
            } else if (lon <= 9.21) {
                // Marseille to Portofino (wrap happens here)
                const t = (lon - 5.37) / (9.21 - 5.37);
                targetY = -1.65 + t * (4.60 - (-1.65));
            } else if (lon <= 12.50) {
                // Portofino to Rome
                const t = (lon - 9.21) / (12.50 - 9.21);
                targetY = 4.60 + t * (4.50 - 4.60);
            } else if (lon <= 14.51) {
                // Rome to Malta
                const t = (lon - 12.50) / (14.51 - 12.50);
                targetY = 4.50 + t * (4.42 - 4.50);
            } else if (lon <= 130.85) {
                // Malta to Darwin
                const t = (lon - 14.51) / (130.85 - 14.51);
                targetY = 4.42 + t * (2.44 - 4.42);
            } else if (lon <= 151.21) {
                // Darwin to Sydney
                const t = (lon - 130.85) / (151.21 - 130.85);
                targetY = 2.44 + t * (2.10 - 2.44);
            } else if (lon <= 153.03) {
                // Sydney to Brisbane (wrap happens here)
                const t = (lon - 151.21) / (153.03 - 151.21);
                targetY = 2.10 + t * (8.30 - 2.10);
            } else if (lon <= 167.90) {
                // Brisbane to Milford Sound
                const t = (lon - 153.03) / (167.90 - 153.03);
                targetY = 8.30 + t * (8.10 - 8.30);
            } else if (lon <= 174.78) {
                // Milford to Auckland
                const t = (lon - 167.90) / (174.78 - 167.90);
                targetY = 8.10 + t * (8.01 - 8.10);
            } else if (lon <= 176.17) {
                // Auckland to Tauranga
                const t = (lon - 174.78) / (176.17 - 174.78);
                targetY = 8.01 + t * (7.93 - 8.01);
            } else {
                // Tauranga to Napier and beyond
                const t = (lon - 176.17) / (176.91 - 176.17);
                targetY = 7.93 + t * (7.90 - 7.93);
            }
            
            // Start zoom-out transition, then rotate, then zoom-in
            isTransitioning = true;
            transitionPhase = 'zoom-out';
            transitionStartTime = Date.now();
            
            // Store target rotation for after zoom-out
            pendingRotationY = targetY;
            pendingRotationX = lat * (Math.PI / 180);
            pendingLocation = loc;
            
            console.log(loc.title, '- lon:', lon, 'lat:', lat, 'targetY:', targetY.toFixed(2));
        }
        
        // Pending rotation values during transition
        let pendingRotationY = 0;
        let pendingRotationX = 0;
        let pendingLocation = null;

        function triggerBounce(locationId) {
            bouncingMarkerId = locationId;
            bounceStartTime = Date.now();
        }

        // Track current location for next door navigation
        let currentLocation = null;
        
        function openPanel(loc) {
            currentLocation = loc;
            
            // Hide tooltip when opening panel
            hideTooltip();
            
            document.getElementById('panelImage').src = loc.image;
            document.getElementById('panelTag').textContent = loc.tag;
            document.getElementById('panelTitle').textContent = loc.title;
            
            const paragraphs = loc.fullDesc.split('\n\n');
            
            // Show first paragraph as preview (truncated if too long)
            let preview = paragraphs[0];
            if (preview.length > 150) {
                preview = preview.substring(0, 150) + '...';
            }
            document.getElementById('panelPreview').textContent = preview;
            
            // Full text for expanded view
            document.getElementById('panelText').innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');
            
            // Update next door button based on current location
            updateNextDoorButton(loc);
            
            // Reset expanded state when opening new location
            sidePanel.classList.remove('expanded');
            sidePanel.classList.add('open');
            panelIsOpen = true; // Stop auto-rotation while reading
        }
        
        function updateNextDoorButton(loc) {
            const nextDoorHint = document.getElementById('nextDoorHint');
            const nextDoorText = document.getElementById('nextDoorText');
            
            // Find doors
            const doors = locations.filter(l => l.isDoor);
            const doorIndex = doors.findIndex(d => d.id === loc.id);
            
            if (loc.isDoor && doorIndex < doors.length - 1) {
                // This is a door and there's a next door
                const nextDoor = doors[doorIndex + 1];
                const nextDoorNum = doorIndex + 2;
                nextDoorText.textContent = `Continue to Door #${nextDoorNum}`;
                nextDoorHint.style.display = '';
                nextDoorHint.dataset.nextDoorId = nextDoor.id;
            } else {
                // Last door or not a door - hide the next door button
                nextDoorHint.style.display = 'none';
            }
        }
        
        function goToNextDoor() {
            const nextDoorHint = document.getElementById('nextDoorHint');
            const nextDoorId = parseInt(nextDoorHint.dataset.nextDoorId);
            const nextDoor = locations.find(l => l.id === nextDoorId);
            
            if (nextDoor) {
                // Close panel and rotate globe to next door
                // User must click the icon to open the door
                closePanel();
                focusLocation(nextDoor);
            }
        }
        
        function viewAllLocations() {
            closePanel();
            // On mobile, open the locations menu; on desktop, list is already visible
            if (window.innerWidth <= 768) {
                setTimeout(toggleMobileMenu, 300);
            }
        }

        function closePanel() {
            sidePanel.classList.remove('open');
            sidePanel.classList.remove('expanded');
            panelIsOpen = false; // Resume auto-rotation
            currentLocation = null;
        }
        
        function expandPanel() {
            sidePanel.classList.add('expanded');
        }
        
        // Swipe up to expand panel on mobile
        let panelTouchStartY = 0;
        sidePanel.addEventListener('touchstart', function(e) {
            panelTouchStartY = e.touches[0].clientY;
        }, { passive: true });
        
        sidePanel.addEventListener('touchend', function(e) {
            const touchEndY = e.changedTouches[0].clientY;
            const swipeDistance = panelTouchStartY - touchEndY;
            
            // If swiped up more than 50px and panel is not expanded, expand it
            if (swipeDistance > 50 && !sidePanel.classList.contains('expanded')) {
                expandPanel();
            }
            // If swiped down more than 50px and panel is expanded, collapse it
            else if (swipeDistance < -50 && sidePanel.classList.contains('expanded')) {
                sidePanel.classList.remove('expanded');
            }
        }, { passive: true });

        function onMouseDown(event) {
            event.preventDefault();
            isUserInteracting = true;
            
            // Hide tooltip when user starts interacting
            hideTooltip();
            
            mouseXOnMouseDown = event.clientX;
            mouseYOnMouseDown = event.clientY;
            
            // Capture current TARGET rotation (not globe rotation) for smooth continuation
            targetRotationXOnMouseDown = targetRotationX;
            targetRotationYOnMouseDown = targetRotationY;
        }

        function onMouseMove(event) {
            if (isUserInteracting) {
                targetRotationY = targetRotationYOnMouseDown + (event.clientX - mouseXOnMouseDown) * 0.002;
                targetRotationX = targetRotationXOnMouseDown + (event.clientY - mouseYOnMouseDown) * 0.002;
                targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));
            }
            
            checkHover(event);
        }

        function onMouseUp() {
            isUserInteracting = false;
        }

        function onMouseWheel(event) {
            event.preventDefault();
            camera.position.z += event.deltaY * 0.002;
            camera.position.z = Math.max(1.2, Math.min(4, camera.position.z));
        }

        // Touch events
        let touchStartX, touchStartY;
        let initialPinchDistance = null;
        let initialCameraZ = null;
        
        function onTouchStart(event) {
            // Hide tooltip when user starts interacting
            hideTooltip();
            
            if (event.touches.length === 1) {
                isUserInteracting = true;
                touchStartX = event.touches[0].clientX;
                touchStartY = event.touches[0].clientY;
                targetRotationXOnMouseDown = targetRotationX;
                targetRotationYOnMouseDown = targetRotationY;
            } else if (event.touches.length === 2) {
                // Pinch zoom start
                isUserInteracting = true;
                initialPinchDistance = getPinchDistance(event.touches);
                initialCameraZ = camera.position.z;
            }
        }

        function onTouchMove(event) {
            event.preventDefault();
            
            if (event.touches.length === 1 && isUserInteracting && !initialPinchDistance) {
                // Single finger drag to rotate
                targetRotationY = targetRotationYOnMouseDown + (event.touches[0].clientX - touchStartX) * 0.002;
                targetRotationX = targetRotationXOnMouseDown + (event.touches[0].clientY - touchStartY) * 0.002;
                targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));
            } else if (event.touches.length === 2 && initialPinchDistance) {
                // Pinch to zoom
                const currentDistance = getPinchDistance(event.touches);
                const scale = initialPinchDistance / currentDistance;
                camera.position.z = Math.max(1.2, Math.min(4, initialCameraZ * scale));
            }
        }

        function onTouchEnd(event) {
            if (event.touches.length === 0) {
                isUserInteracting = false;
                initialPinchDistance = null;
                initialCameraZ = null;
            } else if (event.touches.length === 1) {
                // Switched from pinch to single touch
                initialPinchDistance = null;
                touchStartX = event.touches[0].clientX;
                touchStartY = event.touches[0].clientY;
                targetRotationXOnMouseDown = targetRotationX;
                targetRotationYOnMouseDown = targetRotationY;
            }
        }
        
        function getPinchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }
        
        // Mobile tap to select location
        function onTouchTap(event) {
            if (event.changedTouches.length === 1) {
                const touch = event.changedTouches[0];
                mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(markers);
                
                if (intersects.length > 0) {
                    const marker = intersects[0].object;
                    if (marker.userData.title) {
                        openPanel(marker.userData);
                    }
                }
            }
        }
        
        // Mobile menu toggle
        function toggleMobileMenu() {
            const menu = document.getElementById('locationList');
            const toggle = document.getElementById('menuToggle');
            const overlay = document.getElementById('mobileOverlay');
            
            menu.classList.toggle('open');
            toggle.classList.toggle('open');
            overlay.classList.toggle('open');
        }
        
        // Close mobile menu when location selected
        function closeMobileMenu() {
            const menu = document.getElementById('locationList');
            const toggle = document.getElementById('menuToggle');
            const overlay = document.getElementById('mobileOverlay');
            
            menu.classList.remove('open');
            toggle.classList.remove('open');
            overlay.classList.remove('open');
        }

        function onClick(event) {
            if (hoveredMarker) {
                const loc = hoveredMarker.userData;
                
                // Check if this is Door #1 (Toledo) - trigger 3D animation
                if (loc.title === "Toledo, Ohio") {
                    // If door is in idle state, start animation then open panel
                    if (door1AnimPhase === 'idle') {
                        triggerDoor1Animation();
                        // Open panel after animation completes
                        setTimeout(() => {
                            openPanel(loc);
                        }, 2200); // Total animation time: shake(600) + unlock(400) + fall(300) + swing(800) + buffer
                        return;
                    } else if (door1AnimPhase === 'open') {
                        // Door already open, just open panel
                        openPanel(loc);
                        return;
                    }
                    // If mid-animation, do nothing
                    return;
                }
                
                // Check if this is Door #2 (Darwin) - trigger wooden door animation
                if (loc.title === "Darwin, Australia") {
                    if (door2AnimPhase === 'idle') {
                        triggerDoor2Animation();
                        setTimeout(() => {
                            openPanel(loc);
                        }, 2200); // lever(600) + bar(500) + swing(1000) + buffer
                        return;
                    } else if (door2AnimPhase === 'open') {
                        openPanel(loc);
                        return;
                    }
                    return;
                }
                
                // Regular locations
                openPanel(loc);
            }
        }

        function checkHover(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(markers);
            
            if (intersects.length > 0) {
                const marker = intersects[0].object;
                
                if (marker.userData.title) {
                    hoveredMarker = marker;
                    showTooltip(marker.userData, event.clientX, event.clientY);
                    document.body.style.cursor = 'pointer';
                    
                    // Highlight marker - scale up from original size
                    const baseScale = marker.userData.baseSize * 2;
                    marker.scale.set(baseScale * 1.3, baseScale * 1.3, 1);
                }
            } else {
                if (hoveredMarker) {
                    // Reset to original size
                    const baseScale = hoveredMarker.userData.baseSize * 2;
                    hoveredMarker.scale.set(baseScale, baseScale, 1);
                }
                hoveredMarker = null;
                hideTooltip();
                document.body.style.cursor = isUserInteracting ? 'grabbing' : 'grab';
            }
        }

        function showTooltip(loc, x, y) {
            document.getElementById('tooltipTag').textContent = loc.tag;
            document.getElementById('tooltipTitle').textContent = loc.title;
            document.getElementById('tooltipDesc').textContent = loc.shortDesc;
            
            tooltip.style.left = (x + 20) + 'px';
            tooltip.style.top = (y - 20) + 'px';
            tooltip.classList.add('visible');
        }

        function hideTooltip() {
            tooltip.classList.remove('visible');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Cinematic intro - just zoom, globe is already positioned
            if (!introComplete) {
                if (!introStartTime) {
                    introStartTime = Date.now();
                    // Set globe rotation immediately to Toledo
                    globe.rotation.y = TOLEDO_Y;
                    globe.rotation.x = TOLEDO_X;
                    targetRotationY = TOLEDO_Y;
                    targetRotationX = TOLEDO_X;
                }
                
                const elapsed = Date.now() - introStartTime;
                const progress = Math.min(elapsed / introDuration, 1);
                
                // Easing function for smooth deceleration
                const easeOutCubic = 1 - Math.pow(1 - progress, 3);
                
                // Zoom from far (8) to close (1.8)
                camera.position.z = 8 - (6.2 * easeOutCubic);
                
                if (progress >= 1) {
                    introComplete = true;
                }
            } else {
                // Handle zoom transition animation
                if (isTransitioning) {
                    const elapsed = Date.now() - transitionStartTime;
                    
                    if (transitionPhase === 'zoom-out') {
                        const progress = Math.min(elapsed / zoomOutDuration, 1);
                        const easeOut = 1 - Math.pow(1 - progress, 2);
                        
                        // Zoom out
                        const startZ = camera.position.z;
                        camera.position.z = startZ + (zoomOutDistance - startZ) * easeOut * 0.1;
                        
                        if (progress >= 1) {
                            // Switch to rotate phase - apply pending rotation
                            targetRotationY = pendingRotationY;
                            targetRotationX = pendingRotationX;
                            transitionPhase = 'zoom-in';
                            transitionStartTime = Date.now();
                        }
                    } else if (transitionPhase === 'zoom-in') {
                        const progress = Math.min(elapsed / zoomInDuration, 1);
                        const easeOut = 1 - Math.pow(1 - progress, 3);
                        
                        // Zoom in
                        camera.position.z = zoomOutDistance - (zoomOutDistance - zoomInDistance) * easeOut;
                        
                        // Check if globe rotation has settled (close enough to target)
                        const rotationSettled = 
                            Math.abs(globe.rotation.y - targetRotationY) < 0.05 &&
                            Math.abs(globe.rotation.x - targetRotationX) < 0.05;
                        
                        if (progress >= 1 && rotationSettled) {
                            isTransitioning = false;
                            transitionPhase = 'none';
                            camera.position.z = zoomInDistance;
                            
                            // Trigger bounce animation for the target location
                            if (pendingLocation) {
                                triggerBounce(pendingLocation.id);
                                // Panel no longer auto-opens - user must click icon
                                pendingLocation = null;
                            }
                        }
                    }
                }
                
                // Normal interaction after intro
                
                // Only auto-rotate if:
                // - User is not dragging
                // - Panel is not open (user is not reading)
                // - Not transitioning
                if (!isUserInteracting && !panelIsOpen && !isTransitioning) {
                    targetRotationY += 0.0001;
                }
                
                // Always smooth-lerp toward target rotation
                // This handles: auto-rotate, user drag, and clicking to new location
                globe.rotation.y += (targetRotationY - globe.rotation.y) * 0.05;
                globe.rotation.x += (targetRotationX - globe.rotation.x) * 0.05;
            }
            
            // Marker animations
            markers.forEach((marker, i) => {
                const isDoor = marker.userData.isDoor;
                const baseScale = marker.userData.baseSize * 2; // Original scale
                const isBouncing = bouncingMarkerId && marker.userData.id === bouncingMarkerId;
                
                if (isBouncing && bounceStartTime) {
                    // Bounce animation - up and down with decreasing amplitude
                    const elapsed = Date.now() - bounceStartTime;
                    const progress = elapsed / bounceDuration;
                    
                    if (progress < 1) {
                        // Bouncing: scale pulses with decreasing amplitude
                        const bounceFreq = 8; // Number of bounces
                        const decay = 1 - progress; // Decreasing amplitude
                        const bounce = 1 + Math.sin(progress * Math.PI * bounceFreq) * 0.4 * decay;
                        marker.scale.set(baseScale * bounce, baseScale * bounce, 1);
                    } else {
                        // Animation complete
                        bouncingMarkerId = null;
                        bounceStartTime = null;
                        marker.scale.set(baseScale, baseScale, 1);
                    }
                } else if (isDoor && !isBouncing) {
                    // Subtle pulse effect for doors
                    const pulse = 1 + Math.sin(Date.now() * 0.003 + i) * 0.1;
                    if (!hoveredMarker || hoveredMarker !== marker) {
                        marker.scale.set(baseScale * pulse, baseScale * pulse, 1);
                    }
                }
            });
            
            // Render Door #1 3D animation
            renderDoor1Frame();
            
            // Render Door #2 3D animation
            renderDoor2Frame();
            
            renderer.render(scene, camera);
        }

        // Stars background
        function initStars() {
            const canvas = document.getElementById('stars');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const stars = [];
            for (let i = 0; i < 300; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.5,
                    opacity: Math.random() * 0.5 + 0.3,
                    twinkle: Math.random() * Math.PI
                });
            }
            
            function drawStars() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    const opacity = star.opacity + Math.sin(Date.now() * 0.001 + star.twinkle) * 0.2;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(245, 240, 232, ${Math.max(0.1, opacity)})`;
                    ctx.fill();
                });
                requestAnimationFrame(drawStars);
            }
            
            drawStars();
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // Initialize
        init();
    </script>

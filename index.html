<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shiplife — An Interactive Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4a574;
            --gold-light: #e8c9a0;
            --navy: #0a1628;
            --navy-light: #152238;
            --cream: #f5f0e8;
            --coral: #e07a5f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(ellipse at center, #1a2a4a 0%, var(--navy) 70%);
            color: var(--cream);
            min-height: 100vh;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 2rem 3rem;
            background: linear-gradient(180deg, rgba(10, 22, 40, 0.9) 0%, transparent 100%);
            pointer-events: none;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        .logo span {
            color: var(--gold);
        }

        .tagline {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(245, 240, 232, 0.4);
            margin-top: 0.25rem;
        }

        /* Instructions */
        .instructions {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }

        .instructions p {
            font-size: 0.8rem;
            color: rgba(245, 240, 232, 0.5);
            letter-spacing: 0.1em;
        }

        /* Location tooltip */
        .tooltip {
            position: fixed;
            z-index: 200;
            background: linear-gradient(135deg, 
                rgba(212, 165, 116, 0.2), 
                rgba(224, 122, 95, 0.15));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 165, 116, 0.3);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            max-width: 280px;
        }

        .tooltip.visible {
            opacity: 1;
        }
        
        /* Hide tooltip on touch devices */
        @media (hover: none) and (pointer: coarse) {
            .tooltip {
                display: none !important;
            }
        }

        .tooltip-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            color: var(--cream);
            margin-bottom: 0.25rem;
        }

        .tooltip-tag {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .tooltip-desc {
            font-size: 0.8rem;
            color: rgba(245, 240, 232, 0.7);
            line-height: 1.5;
        }

        /* Side panel for clicked location */
        .side-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 400px;
            height: 100%;
            background: linear-gradient(180deg, 
                rgb(10, 22, 40) 0%, 
                rgb(21, 34, 56) 100%);
            border-left: 1px solid rgba(212, 165, 116, 0.2);
            z-index: 150;
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        .side-panel.open {
            transform: translateX(0);
        }

        .panel-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .panel-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .panel-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .panel-content {
            padding: 2rem;
        }

        .panel-tag {
            display: inline-block;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            background: rgba(212, 165, 116, 0.15);
            padding: 0.4rem 0.8rem;
            border-radius: 3px;
            border: 1px solid rgba(212, 165, 116, 0.3);
            margin-bottom: 0.75rem;
        }

        .panel-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            color: var(--cream);
            margin-bottom: 1.5rem;
        }

        .panel-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            line-height: 1.8;
            color: rgba(245, 240, 232, 0.85);
        }

        .panel-text p {
            margin-bottom: 1rem;
        }

        /* Back to globe link - subtle secondary action */
        .back-to-globe {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            color: rgba(245, 240, 232, 0.35);
            font-size: 0.75rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        .back-to-globe:hover {
            color: rgba(245, 240, 232, 0.6);
        }
        
        /* Next Door button - prominent call to action */
        .next-door-hint {
            display: block;
            margin-top: 20px;
            padding: 18px 20px;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.25), rgba(212, 165, 116, 0.1));
            border: 2px solid rgba(212, 165, 116, 0.5);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .next-door-hint:hover {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.35), rgba(212, 165, 116, 0.15));
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 165, 116, 0.2);
        }
        
        .next-door-hint .door-icon {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .next-door-hint .door-text {
            display: block;
            font-size: 1rem;
            font-weight: 500;
            color: var(--gold);
            letter-spacing: 0.05em;
        }

        /* Locations hint - visual link to panel below */
        .locations-hint {
            display: block;
            margin-top: 15px;
            padding: 15px 20px;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15), rgba(212, 165, 116, 0.05));
            border: 1px solid rgba(212, 165, 116, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .locations-hint:hover {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.25), rgba(212, 165, 116, 0.1));
        }
        
        .locations-hint .hint-arrow {
            display: block;
            font-size: 1.2rem;
            color: var(--gold);
            animation: bounce-arrow 1.5s ease-in-out infinite;
        }
        
        .locations-hint .hint-text {
            display: block;
            font-size: 0.9rem;
            color: var(--cream);
            margin: 5px 0 3px;
            font-weight: 500;
        }
        
        .locations-hint .hint-count {
            display: block;
            font-size: 0.75rem;
            color: var(--gold);
            opacity: 0.8;
        }
        
        @keyframes bounce-arrow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }

        @media (max-width: 768px) {
            .panel-close-link {
                display: block;
            }
            
            .locations-hint {
                display: block;
            }
        }

        /* Location list */
        .location-list {
            position: fixed;
            left: 2rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            max-height: 60vh;
            overflow-y: auto;
        }

        .location-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            margin-bottom: 0.25rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
        }

        .location-item:hover {
            background: rgba(212, 165, 116, 0.1);
        }

        .location-item.door {
            background: rgba(212, 165, 116, 0.08);
        }

        .location-item .icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, 
                rgba(212, 165, 116, 0.3), 
                rgba(224, 122, 95, 0.2));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(212, 165, 116, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            overflow: hidden;
        }
        
        .location-item .icon canvas {
            width: 100%;
            height: 100%;
        }

        .location-item.door .icon {
            width: 38px;
            height: 38px;
            font-size: 1.1rem;
            border: 2px solid rgba(212, 165, 116, 0.5);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.3);
        }

        .location-item .name {
            font-size: 0.85rem;
            color: var(--cream);
        }

        .location-item.door .name {
            color: var(--gold);
            font-weight: 500;
        }
        
        /* Icon style indicators */
        .location-item[data-style="deco"] .icon {
            border-color: rgba(212, 165, 116, 0.5);
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.2), rgba(139, 105, 20, 0.2));
        }
        
        .location-item[data-style="minimal"] .icon {
            border-color: rgba(150, 180, 200, 0.4);
            background: linear-gradient(135deg, rgba(150, 180, 200, 0.15), rgba(96, 112, 128, 0.15));
        }
        
        .location-item[data-style="heritage"] .icon {
            border-color: rgba(139, 115, 85, 0.5);
            background: linear-gradient(135deg, rgba(139, 115, 85, 0.2), rgba(90, 74, 58, 0.2));
        }
        
        .location-item[data-style="paradise"] .icon {
            border-color: rgba(64, 224, 208, 0.4);
            background: linear-gradient(135deg, rgba(64, 224, 208, 0.15), rgba(74, 144, 160, 0.15));
        }
        
        .location-item[data-style="adventure"] .icon {
            border-color: rgba(96, 112, 128, 0.5);
            background: linear-gradient(135deg, rgba(96, 112, 128, 0.2), rgba(45, 55, 72, 0.2));
        }
        
        .location-item[data-style="culture"] .icon {
            border-color: rgba(224, 122, 95, 0.4);
            background: linear-gradient(135deg, rgba(224, 122, 95, 0.15), rgba(114, 47, 55, 0.15));
        }

        /* Scrollbar styling */
        /* Subtle scrollbar for location list */
        .location-list::-webkit-scrollbar {
            width: 4px;
        }

        .location-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .location-list::-webkit-scrollbar-thumb {
            background: rgba(212, 165, 116, 0.15);
            border-radius: 2px;
        }
        
        .location-list::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 165, 116, 0.3);
        }
        
        /* General scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(212, 165, 116, 0.3);
            border-radius: 3px;
        }

        /* Stars background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            color: var(--gold);
        }

        @media (max-width: 768px) {
            .header {
                padding: 1rem 1.5rem;
            }
            
            .logo {
                font-size: 1.5rem;
            }
            
            .tagline {
                font-size: 0.55rem;
            }
            
            /* Left menu - bottom sheet style */
            .location-list {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                top: auto;
                width: 100%;
                height: auto;
                max-height: 50vh;
                background: linear-gradient(180deg, 
                    rgba(10, 22, 40, 0.98) 0%,
                    rgba(21, 34, 56, 0.98) 100%);
                backdrop-filter: blur(30px);
                transform: translateY(100%);
                transition: transform 0.3s ease;
                padding: 20px 15px 30px;
                z-index: 200;
                border-top: 1px solid rgba(212, 165, 116, 0.3);
                border-radius: 20px 20px 0 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .location-list.open {
                transform: translateY(0);
            }
            
            .location-list::before {
                content: '';
                display: block;
                width: 40px;
                height: 4px;
                background: rgba(212, 165, 116, 0.5);
                border-radius: 2px;
                margin: 0 auto 15px;
            }
            
            /* Right panel - bottom sheet style, starts as preview */
            .side-panel {
                position: fixed !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                top: auto !important;
                width: 100% !important;
                height: 45vh;
                max-height: 45vh;
                border-radius: 20px 20px 0 0;
                border-left: none;
                border-top: 1px solid rgba(212, 165, 116, 0.3);
                transform: translateY(100%);
                overflow: hidden;
                z-index: 300 !important;
                background: linear-gradient(180deg, rgb(10, 22, 40) 0%, rgb(21, 34, 56) 100%) !important;
            }
            
            .side-panel.open {
                transform: translateY(0) !important;
            }
            
            .side-panel.expanded {
                height: 90vh;
                max-height: 90vh;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .panel-close {
                position: absolute;
                top: 0.75rem;
                right: 0.75rem;
                z-index: 300;
                width: 36px;
                height: 36px;
                background: rgba(10, 22, 40, 0.9);
                border: 2px solid var(--gold);
            }
            
            .panel-image {
                height: 120px;
            }
            
            .side-panel.expanded .panel-image {
                height: 200px;
            }
            
            .panel-content {
                padding: 1rem 1.5rem;
                padding-bottom: 30px;
            }
            
            .side-panel.expanded .panel-content {
                padding-bottom: 100px;
            }
            
            /* Show back link always */
            .back-to-globe {
                display: block;
            }
            
            /* Hide next door and locations hint in collapsed state */
            .next-door-hint,
            .locations-hint {
                display: none;
            }
            
            /* Show them when expanded */
            .side-panel.expanded .next-door-hint,
            .side-panel.expanded .locations-hint {
                display: block;
            }
            
            /* Hide swipe hint when expanded */
            .side-panel.expanded .swipe-hint {
                display: none;
            }
            
            .panel-title {
                font-size: 1.5rem;
                margin-bottom: 0.75rem;
            }
            
            .panel-text {
                display: none;
            }
            
            .side-panel.expanded .panel-text {
                display: block;
            }
            
            .side-panel.expanded .panel-content {
                padding-bottom: 100px;
            }
            
            .instructions {
                bottom: 1.5rem;
                left: 1rem;
                right: 1rem;
                transform: none;
                background: rgba(10, 22, 40, 0.8);
                padding: 0.5rem 1rem;
                border-radius: 20px;
            }
            
            .instructions p {
                font-size: 0.65rem;
            }
            
            /* Prevent page zoom on double-tap */
            * {
                touch-action: manipulation;
            }
        }
        
        /* Panel preview text - shown on mobile before expanding */
        .panel-preview {
            display: none;
        }
        
        .swipe-hint {
            display: none;
        }
        
        @media (max-width: 768px) {
            .panel-preview {
                display: block;
                font-family: 'Cormorant Garamond', serif;
                font-size: 1rem;
                line-height: 1.6;
                color: rgba(245, 240, 232, 0.85);
                margin-top: 0.5rem;
            }
            
            .side-panel.expanded .panel-preview {
                display: none;
            }
            
            .swipe-hint {
                display: block;
                text-align: center;
                font-size: 0.75rem;
                color: var(--gold);
                opacity: 0.7;
                margin-top: 1rem;
                animation: pulse-hint 2s ease-in-out infinite;
            }
            
            .side-panel.expanded .swipe-hint {
                display: none;
            }
            
            @keyframes pulse-hint {
                0%, 100% { opacity: 0.5; transform: translateY(0); }
                50% { opacity: 1; transform: translateY(-3px); }
            }
        }
        
        /* Hamburger Menu Button */
        .menu-toggle {
            position: fixed;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 250;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, 
                rgba(212, 165, 116, 0.2), 
                rgba(224, 122, 95, 0.15));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 165, 116, 0.3);
            cursor: pointer;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s ease;
        }
        
        .menu-toggle:hover {
            background: linear-gradient(135deg, 
                rgba(212, 165, 116, 0.3), 
                rgba(224, 122, 95, 0.25));
        }
        
        .menu-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--gold);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        
        .menu-toggle.open span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        
        .menu-toggle.open span:nth-child(2) {
            opacity: 0;
        }
        
        .menu-toggle.open span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }
        
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex !important;
                left: auto !important;
                right: 1rem !important;
                top: auto !important;
                bottom: 5rem !important;
                transform: none !important;
                background: rgba(212, 165, 116, 0.95) !important;
                border: 2px solid var(--gold) !important;
                box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
                z-index: 350 !important;
            }
            
            .menu-toggle span {
                background: var(--navy) !important;
            }
        }
        
        /* Mobile overlay */
        .mobile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 180;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .mobile-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        
        /* Instructions switching */
        .mobile-instructions {
            display: none;
        }
        
        @media (max-width: 768px) {
            .desktop-instructions {
                display: none;
            }
            .mobile-instructions {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- Loading screen -->
    <div class="loading" id="loading">
        <div class="loading-text">Loading globe...</div>
    </div>

    <!-- Stars background -->
    <canvas class="stars" id="stars"></canvas>
    
    <!-- Three.js Canvas -->
    <div id="canvas-container"></div>

    <!-- Header -->
    <div class="header">
        <div class="logo">Ship<span>life</span></div>
        <div class="tagline">12 Years at Sea — An Interactive Journey</div>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>
    
    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>

    <!-- Location List -->
    <div class="location-list" id="locationList"></div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-tag" id="tooltipTag"></div>
        <div class="tooltip-title" id="tooltipTitle"></div>
        <div class="tooltip-desc" id="tooltipDesc"></div>
    </div>

    <!-- Side Panel -->
    <div class="side-panel" id="sidePanel">
        <button class="panel-close" onclick="closePanel()">×</button>
        <img class="panel-image" id="panelImage" src="" alt="">
        <div class="panel-content">
            <div class="panel-tag" id="panelTag"></div>
            <h2 class="panel-title" id="panelTitle"></h2>
            <div class="panel-preview" id="panelPreview"></div>
            <div class="panel-text" id="panelText"></div>
            <div class="swipe-hint">↑ Swipe up for full story</div>
            <div class="next-door-hint" id="nextDoorHint" onclick="goToNextDoor()">
                <span class="door-icon">🚪</span>
                <span class="door-text" id="nextDoorText">Continue to Door #2</span>
            </div>
            <div class="locations-hint" onclick="viewAllLocations()">
                <span class="hint-arrow">↓</span>
                <span class="hint-text">View All Locations</span>
                <span class="hint-count" id="locationsCount">24 places</span>
            </div>
            <a class="back-to-globe" onclick="closePanel()">back to globe</a>
        </div>
    </div>

    <!-- Instructions -->
    <div class="instructions">
        <p class="desktop-instructions">Drag to rotate • Scroll to zoom • Click a location to explore</p>
        <p class="mobile-instructions">Drag to rotate • Pinch to zoom • Tap a location to explore</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Location data
        const locations = [
            {
                id: 1,
                title: "Toledo, Ohio",
                coords: [41.6528, -83.5379],
                tag: "Door #1: Escape",
                icon: "🚪",
                iconType: "door",

        // Three.js setup
        let scene, camera, renderer, globe, markers = [], markerSprites = [];

        let targetRotationX = 0, targetRotationY = 0;
        let mouseXOnMouseDown = 0, mouseYOnMouseDown = 0;
        let targetRotationXOnMouseDown = 0, targetRotationYOnMouseDown = 0;
        
        // Intro animation state
        let introComplete = false;
        let introStartTime = null;
        const introDuration = 3000; // 3 seconds for the zoom in

        // Panel state - controls whether globe auto-rotates
        let panelIsOpen = false;
        
        // Flag to prevent auto-opening panel when navigating
        let skipPanelOpen = false;
        
        // Bounce animation for focused icon
        let bouncingMarkerId = null;
        let bounceStartTime = null;
        const bounceDuration = 1500; // 1.5 seconds of bouncing

        // Zoom transition animation
        let isTransitioning = false;
        let transitionStartTime = null;
        let transitionPhase = 'none'; // 'zoom-out', 'zoom-in', 'none'
        let targetCameraZ = 1.8;
        const zoomOutDistance = 3.5;
        const zoomInDistance = 1.5;  // Closer zoom on locations
        const zoomOutDuration = 600;  // ms
        const zoomInDuration = 800;   // ms

        const tooltip = document.getElementById('tooltip');
        const sidePanel = document.getElementById('sidePanel');
        
        // Toledo: 41.6528° N, 83.5379° W
        // FOUND: Y = -0.10 shows Toledo (lon = -83.5°)
        // Formula: Y = -0.10 corresponds to -83.5° longitude
        // So: Y = (lon - (-83.5)) * (PI/180) + (-0.10)
        // Simplified: Y = (lon + 83.5) * (PI/180) - 0.10
        const TOLEDO_Y = -0.10;
        const TOLEDO_X = (41.6528 * Math.PI / 180); // positive for north

        function init() {
            // Scene
            scene = new THREE.Scene();
            
            // Camera - start far away for intro
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8; // Start far away in space
            
            // Initialize rotation targets to Toledo
            targetRotationY = TOLEDO_Y;
            targetRotationX = TOLEDO_X;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Raycaster for interaction
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Create globe
            createGlobe();
            
            // Create markers
            createMarkers();

            // Enhanced lighting for high-res globe
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
            scene.add(ambientLight);

            // Main sun light - warm white, positioned for nice terminator line
            const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
            sunLight.position.set(5, 2, 5);
            scene.add(sunLight);
            
            // Subtle fill light from opposite side (simulates earth-shine/ambient)
            const fillLight = new THREE.DirectionalLight(0x4477aa, 0.25);
            fillLight.position.set(-5, -1, -5);
            scene.add(fillLight);
            
            // Rim light for atmosphere edge highlighting
            const rimLight = new THREE.DirectionalLight(0x88aaff, 0.15);
            rimLight.position.set(0, 5, -3);
            scene.add(rimLight);

            // Event listeners
            renderer.domElement.addEventListener('mousedown', onMouseDown, false);
            renderer.domElement.addEventListener('mousemove', onMouseMove, false);
            renderer.domElement.addEventListener('mouseup', onMouseUp, false);
            renderer.domElement.addEventListener('mouseleave', onMouseUp, false);
            renderer.domElement.addEventListener('wheel', onMouseWheel, false);
            renderer.domElement.addEventListener('click', onClick, false);
            window.addEventListener('resize', onWindowResize, false);

            // Touch events
            renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
            renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
            renderer.domElement.addEventListener('touchend', onTouchEnd, false);
            
            // Add tap detection for mobile marker selection
            let touchStartTime;
            let touchStartPos;
            renderer.domElement.addEventListener('touchstart', (e) => {
                touchStartTime = Date.now();
                touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }, false);
            renderer.domElement.addEventListener('touchend', (e) => {
                const touchDuration = Date.now() - touchStartTime;
                const touch = e.changedTouches[0];
                const moveDistance = Math.sqrt(
                    Math.pow(touch.clientX - touchStartPos.x, 2) + 
                    Math.pow(touch.clientY - touchStartPos.y, 2)
                );
                // If it was a quick tap without much movement, treat as click
                if (touchDuration < 300 && moveDistance < 10) {
                    onTouchTap(e);
                }
            }, false);

            // Build location list
            buildLocationList();

            // Hide loading screen
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1000);

            // Start animation
            animate();
            
            // Stars
            initStars();
        }

        function createGlobe() {
            const textureLoader = new THREE.TextureLoader();
            
            // NASA Blue Marble 8K texture hosted on Imgur
            const earthTexture = textureLoader.load(
                'https://i.imgur.com/TIrHFCa.jpg',
                function() { 
                    console.log('Earth texture loaded');
                }
            );
            
            // Bump map for terrain elevation
            const bumpMap = textureLoader.load(
                'https://unpkg.com/three-globe/example/img/earth-topology.png'
            );
            
            // Specular map - makes oceans shiny, land matte
            const specularMap = textureLoader.load(
                'https://unpkg.com/three-globe/example/img/earth-water.png'
            );

            // Higher polygon count for smoother sphere
            const geometry = new THREE.SphereGeometry(1, 128, 128);
            
            // Enhanced material with specular highlights on water
            const material = new THREE.MeshPhongMaterial({
                map: earthTexture,
                bumpMap: bumpMap,
                bumpScale: 0.015,
                specularMap: specularMap,
                specular: new THREE.Color(0x666666),
                shininess: 25
            });

            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            // Enhanced atmosphere glow - multiple layers for depth
            // Inner atmosphere (subtle blue rim)
            const innerAtmoGeometry = new THREE.SphereGeometry(1.015, 64, 64);
            const innerAtmoMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.75 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.5);
                        vec3 atmosphereColor = vec3(0.4, 0.7, 1.0);
                        gl_FragColor = vec4(atmosphereColor, intensity * 0.8);
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true,
                depthWrite: false
            });
            const innerAtmosphere = new THREE.Mesh(innerAtmoGeometry, innerAtmoMaterial);
            globe.add(innerAtmosphere);
            
            // Outer atmosphere (soft glow extending further)
            const outerAtmoGeometry = new THREE.SphereGeometry(1.12, 64, 64);
            const outerAtmoMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
                        vec3 glowColor = vec3(0.3, 0.5, 0.9);
                        gl_FragColor = vec4(glowColor, intensity * 0.4);
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,

            });
            const outerAtmosphere = new THREE.Mesh(outerAtmoGeometry, outerAtmoMaterial);

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            
            return new THREE.Vector3(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        function renderSidebarIcon(canvas, config) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            const cx = size / 2;
            const cy = size / 2;
            
            ctx.clearRect(0, 0, size, size);
            
            const color = config.color;
            const accent = config.accent;
            
            switch(config.symbol) {
                case 'steel-door':
                    // Heavy steel door with padlock
                    // Door frame
                    ctx.fillStyle = '#2d3748';
                    ctx.fillRect(cx - 14, cy - 18, 28, 36);
                    
                    // Door panel
                    ctx.fillStyle = color;
                    ctx.fillRect(cx - 11, cy - 15, 22, 30);
                    
                    // Reinforcement lines
                    ctx.strokeStyle = '#2d3748';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(cx - 11, cy - 5);
                    ctx.lineTo(cx + 11, cy - 5);
                    ctx.moveTo(cx - 11, cy + 5);
                    ctx.lineTo(cx + 11, cy + 5);
                    ctx.stroke();
                    
                    // Padlock body
                    ctx.fillStyle = accent;
                    ctx.fillRect(cx - 5, cy - 2, 10, 10);
                    
                    // Padlock shackle (U-shape)
                    ctx.strokeStyle = accent;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(cx, cy - 4, 4, Math.PI, 0);
                    ctx.stroke();
                    
                    // Keyhole
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath();
                    ctx.arc(cx, cy + 3, 2, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                    
                case 'wood-door':
                    // Wooden door
                    ctx.fillStyle = color;
                    ctx.fillRect(cx - 12, cy - 16, 24, 32);
                    ctx.strokeStyle = accent;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(cx - 10, cy - 14, 20, 28);
                    ctx.beginPath();
                    ctx.arc(cx + 6, cy, 3, 0, Math.PI * 2);
                    ctx.stroke();
                    break;
                    
                case 'gold-door':
                    // Golden door
                    const goldGrad = ctx.createLinearGradient(cx - 12, 0, cx + 12, 0);
                    goldGrad.addColorStop(0, color);
                    goldGrad.addColorStop(0.5, accent);
                    goldGrad.addColorStop(1, color);
                    ctx.fillStyle = goldGrad;
                    ctx.fillRect(cx - 12, cy - 16, 24, 32);
                    ctx.strokeStyle = accent;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(cx - 12, cy - 16, 24, 32);
                    break;
                    
                case 'crown':
                    // Crown
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.moveTo(cx - 14, cy + 8);
                    ctx.lineTo(cx - 10, cy - 8);
                    ctx.lineTo(cx - 5, cy);
                    ctx.lineTo(cx, cy - 12);
                    ctx.lineTo(cx + 5, cy);
                    ctx.lineTo(cx + 10, cy - 8);
                    ctx.lineTo(cx + 14, cy + 8);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = accent;
                    ctx.beginPath();
                    ctx.arc(cx, cy - 12, 3, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                    
                case 'sunrise':
                    // Rising sun
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(cx, cy + 5, 12, Math.PI, 0);
                    ctx.fill();
                    ctx.strokeStyle = accent;
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 7; i++) {
                        const angle = Math.PI + (i / 6) * Math.PI;
                        ctx.beginPath();
                        ctx.moveTo(cx + Math.cos(angle) * 14, cy + 5 + Math.sin(angle) * 14);
                        ctx.lineTo(cx + Math.cos(angle) * 20, cy + 5 + Math.sin(angle) * 20);
                        ctx.stroke();
                    }
                    break;
                    
                case 'fireworks':
                    // Fireworks burst
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(cx + Math.cos(angle) * 4, cy + Math.sin(angle) * 4);
                        ctx.lineTo(cx + Math.cos(angle) * 14, cy + Math.sin(angle) * 14);
                        ctx.stroke();
                    }
                    ctx.fillStyle = accent;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                    
                case 'star':
                    // Simple star
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const outerAngle = (i / 5) * Math.PI * 2 - Math.PI / 2;
                        const innerAngle = ((i + 0.5) / 5) * Math.PI * 2 - Math.PI / 2;
                        if (i === 0) ctx.moveTo(cx + Math.cos(outerAngle) * 14, cy + Math.sin(outerAngle) * 14);
                        else ctx.lineTo(cx + Math.cos(outerAngle) * 14, cy + Math.sin(outerAngle) * 14);
                        ctx.lineTo(cx + Math.cos(innerAngle) * 6, cy + Math.sin(innerAngle) * 6);
                    }
                    ctx.closePath();
                    ctx.fill();
                    break;
                    
                case 'car':

                case 'column':

                case 'arch':

                    ctx.fillStyle = '#0a1628';

                case 'mountain':

                    ctx.lineTo(cx + 8, cy - 14);
                    ctx.lineTo(cx + 16, cy + 12);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = accent;
                    ctx.beginPath();
                    ctx.moveTo(cx + 8, cy - 14);
                    ctx.lineTo(cx + 4, cy - 8);
                    ctx.lineTo(cx + 12, cy - 8);
                    ctx.closePath();
                    ctx.fill();
                    break;
                    
                case 'shark':
                    // Shark fin
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.moveTo(cx - 12, cy + 8);
                    ctx.quadraticCurveTo(cx - 4, cy + 6, cx, cy - 12);
                    ctx.quadraticCurveTo(cx + 2, cy, cx + 14, cy + 8);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = accent;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(cx - 16, cy + 10);
                    ctx.lineTo(cx + 16, cy + 10);
                    ctx.stroke();
                    break;
                    
                case 'mango':
                    // Mango fruit
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy + 2, 12, 14, 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = accent;
                    ctx.beginPath();
                    ctx.ellipse(cx - 2, cy - 12, 4, 6, -0.5, 0, Math.PI * 2);
                    ctx.fill();

                case 'palm':

                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(cx - 2, cy, 4, 16);
                    ctx.fillStyle = accent;
                    for (let i = 0; i < 5; i++) {
                        const angle = -Math.PI / 2 + (i - 2) * 0.4;

                        );

                    break;
                    
                case 'whale':

                    ctx.fill();
                    break;
                    
                case 'coffee':
                    // Coffee cup
                    ctx.fillStyle = color;
                    ctx.fillRect(cx - 8, cy - 6, 16, 16);

                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;

                        ctx.lineTo(cx + Math.cos(angle) * 16, cy + Math.sin(angle) * 16);

                    }
                    break;
                    
                case 'compass':
                    // Compass
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2;

                    ctx.fillStyle = accent;

                    ctx.moveTo(cx - 2, cy - 6);
                    ctx.lineTo(cx, cy - 2);
                    ctx.lineTo(cx + 2, cy - 6);
                    ctx.fill();

                case 'boat':
                    // Small boat
                    ctx.fillStyle = color;

                    ctx.lineTo(cx + 10, cy + 10);
                    ctx.lineTo(cx + 14, cy + 4);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = accent;
                    ctx.fillRect(cx - 1, cy - 10, 2, 16);
                    ctx.beginPath();
                    ctx.moveTo(cx + 1, cy - 8);
                    ctx.lineTo(cx + 12, cy);
                    ctx.lineTo(cx + 1, cy + 4);
                    ctx.fill();
                    break;
                    
                case 'wine':
                    // Wine glass
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(cx - 8, cy - 10);
                    ctx.quadraticCurveTo(cx - 10, cy - 2, cx, cy + 2);
                    ctx.quadraticCurveTo(cx + 10, cy - 2, cx + 8, cy - 10);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(cx, cy + 2);
                    ctx.lineTo(cx, cy + 12);
                    ctx.moveTo(cx - 6, cy + 12);
                    ctx.lineTo(cx + 6, cy + 12);
                    ctx.stroke();
                    ctx.fillStyle = accent;
                    ctx.beginPath();
                    ctx.arc(cx, cy - 4, 5, 0, Math.PI);
                    ctx.fill();
                    break;
                    
                case 'grapes':
                    // Grape cluster
                    ctx.fillStyle = color;
                    const grapePositions = [[0,-8],[5,-4],[-5,-4],[0,0],[8,0],[-8,0],[3,6],[-3,6],[0,10]];
                    grapePositions.forEach(([x, y]) => {
                        ctx.beginPath();
                        ctx.arc(cx + x, cy + y, 4, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    ctx.fillStyle = accent;
                    ctx.fillRect(cx - 1, cy - 14, 2, 6);
                    break;
                    
                case 'guitar':
                    // Guitar
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy + 6, 10, 8, 0, 0, Math.PI * 2);

                    ctx.ellipse(cx, cy - 2, 6, 5, 0, 0, Math.PI * 2);

                    ctx.fillStyle = accent;
                    ctx.fillRect(cx - 2, cy - 16, 4, 14);
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath();
                    ctx.arc(cx, cy + 6, 3, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                    
                default:
                    // Fallback - simple circle
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 12, 0, Math.PI * 2);
                    ctx.fill();
            }

            // === LAYER 5: Sandy/brown hilly dunes ===
            
            // Rolling sand dunes in background

            ctx.quadraticCurveTo(430, 410, 512, 460);
            ctx.lineTo(512, 520);

            ctx.fill();
            
            // Closer sand dune
            ctx.fillStyle = '#8b7355';
            ctx.beginPath();
            ctx.moveTo(0, 500);
            ctx.quadraticCurveTo(100, 460, 200, 490);
            ctx.quadraticCurveTo(300, 450, 400, 480);
            ctx.quadraticCurveTo(460, 460, 512, 490);
            ctx.lineTo(512, 640);
            ctx.lineTo(0, 640);
            ctx.closePath();
            ctx.fill();
            
            // Helper to draw a lush palm tree
            function drawPalm(x, baseY, trunkH, lean, size) {
                ctx.fillStyle = '#0a0a0a';
                
                // Curved trunk
                ctx.beginPath();
                ctx.moveTo(x - 4 * size, baseY);
                ctx.quadraticCurveTo(x + lean * 0.3, baseY - trunkH * 0.3, x + lean * 0.6, baseY - trunkH * 0.6);
                ctx.quadraticCurveTo(x + lean * 0.8, baseY - trunkH * 0.8, x + lean, baseY - trunkH);
                ctx.lineTo(x + lean + 4 * size, baseY - trunkH);
                ctx.quadraticCurveTo(x + lean * 0.8 + 4 * size, baseY - trunkH * 0.8, x + lean * 0.6 + 4 * size, baseY - trunkH * 0.6);
                ctx.quadraticCurveTo(x + lean * 0.3 + 4 * size, baseY - trunkH * 0.3, x + 4 * size, baseY);
                ctx.closePath();
                ctx.fill();
                
                // Fronds - big drooping leaves
                const cx = x + lean + 2 * size;
                const cy = baseY - trunkH;
                
                for (let i = 0; i < 9; i++) {
                    const angle = (i / 9) * Math.PI * 1.6 - Math.PI * 0.8;
                    const len = (50 + Math.random() * 30) * size;
                    const droop = 0.4 + Math.random() * 0.2;
                    
                    // Main frond stem
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    
                    const midX = cx + Math.cos(angle) * len * 0.5;
                    const midY = cy + Math.sin(angle) * len * 0.3;
                    const endX = cx + Math.cos(angle) * len;
                    const endY = cy + Math.sin(angle) * len * droop + len * 0.2;
                    
                    ctx.quadraticCurveTo(midX, midY, endX, endY);
                    ctx.quadraticCurveTo(midX + 2, midY + 2, cx, cy);
                    ctx.fill();
                    
                    // Leaflets along the frond
                    for (let j = 0; j < 6; j++) {
                        const t = 0.2 + j * 0.13;
                        const lx = cx + (midX - cx) * t * 2;
                        const ly = cy + (endY - cy) * t;
                        const leafLen = 15 * size * (1 - t * 0.5);
                        const leafAngle = angle + (j % 2 === 0 ? 0.4 : -0.4);
                        
                        ctx.beginPath();
                        ctx.moveTo(lx, ly);
                        ctx.lineTo(lx + Math.cos(leafAngle) * leafLen, ly + Math.sin(leafAngle) * leafLen * 0.5);
                        ctx.lineTo(lx + 2, ly + 2);
                        ctx.fill();
                    }
                }
                
                // Coconuts
                ctx.beginPath();
                ctx.arc(cx - 3 * size, cy + 5 * size, 4 * size, 0, Math.PI * 2);
                ctx.arc(cx + 3 * size, cy + 7 * size, 3.5 * size, 0, Math.PI * 2);
                ctx.arc(cx, cy + 9 * size, 3 * size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Helper to draw tropical ferns/bushes
            function drawFern(x, baseY, size) {
                ctx.fillStyle = '#0a0a0a';
                for (let i = 0; i < 7; i++) {
                    const angle = (i / 7) * Math.PI - Math.PI * 0.5;
                    const len = (30 + Math.random() * 20) * size;
                    
                    ctx.beginPath();
                    ctx.moveTo(x, baseY);
                    const endX = x + Math.cos(angle) * len;
                    const endY = baseY - Math.abs(Math.sin(angle)) * len - 10 * size;
                    const ctrlX = x + Math.cos(angle) * len * 0.6;
                    const ctrlY = baseY - Math.abs(Math.sin(angle)) * len * 0.8;
                    
                    ctx.quadraticCurveTo(ctrlX, ctrlY, endX, endY);
                    ctx.lineTo(endX + 2, endY + 3);
                    ctx.quadraticCurveTo(ctrlX + 1, ctrlY + 2, x, baseY);
                    ctx.fill();
                }
            }
            
            // Draw background palms (smaller, in distance)
            drawPalm(80, 490, 90, -10, 0.7);
            drawPalm(420, 480, 100, 15, 0.8);
            drawPalm(250, 470, 70, 5, 0.6);
            
            // Draw ferns and bushes
            drawFern(30, 530, 0.8);

            // Foreground palms (larger)
            drawPalm(50, 600, 150, -20, 1.2);
            drawPalm(450, 610, 170, 25, 1.3);
            
            // More ferns in foreground
            drawFern(0, 580, 1.0);
            drawFern(100, 590, 0.9);
            drawFern(400, 585, 1.1);
            drawFern(512, 595, 1.0);
            
            const sunsetTexture = new THREE.CanvasTexture(sunsetCanvas);
            sunsetTexture.minFilter = THREE.LinearFilter;
            sunsetTexture.magFilter = THREE.LinearFilter;
            
            const sunsetMat = new THREE.MeshBasicMaterial({ 
                map: sunsetTexture,

            });
            
            // Sky backdrop - fits door opening
            const skyPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(1.6, 2.4),
                sunsetMat
            );
            skyPlane.position.set(0, 0, -0.4);
            skyPlane.visible = false;
            door1Scene.add(skyPlane);
            window.skyPlane = skyPlane;
            
            // Remove 3D palm trees - they're now baked into the texture
            window.palmTrees = [];
            window.birds = [];
            
            // Add animated jungle elements that pop forward
            const jungleMat = new THREE.MeshBasicMaterial({ 
                color: 0x0a0a0a,
                side: THREE.DoubleSide
            });
            
            function createAnimatedPalm(x, scale, delay) {
                const palm = new THREE.Group();
                palm.userData.delay = delay;
                palm.userData.baseZ = -0.5;
                palm.userData.targetZ = 0.1; // Pop way forward, in front of door
                palm.userData.baseY = -1.2;
                palm.userData.targetY = -0.5;
                palm.userData.targetScale = scale;
                
                // Much bigger palm silhouette
                // Trunk - taller and curved
                const trunkShape = new THREE.Shape();
                trunkShape.moveTo(-0.04, 0);
                trunkShape.quadraticCurveTo(-0.02, 0.4, 0.02, 0.8);
                trunkShape.lineTo(0.06, 0.8);
                trunkShape.quadraticCurveTo(0.02, 0.4, 0.04, 0);
                trunkShape.closePath();
                
                const trunkGeo = new THREE.ShapeGeometry(trunkShape);
                const trunk = new THREE.Mesh(trunkGeo, jungleMat);
                palm.add(trunk);
                
                // Big dramatic fronds
                for (let i = 0; i < 9; i++) {
                    const angle = (i / 9) * Math.PI * 1.6 - Math.PI * 0.8;
                    const len = 0.4 + Math.random() * 0.15;
                    
                    const frondShape = new THREE.Shape();
                    frondShape.moveTo(0, 0);
                    
                    // Curved drooping frond
                    const midX = Math.cos(angle) * len * 0.5;
                    const midY = Math.sin(angle) * len * 0.3 + 0.1;
                    const endX = Math.cos(angle) * len;
                    const endY = Math.sin(angle) * len * 0.2 - 0.05; // Droop down
                    
                    frondShape.quadraticCurveTo(midX, midY, endX, endY);
                    frondShape.lineTo(endX + 0.02, endY + 0.03);
                    frondShape.quadraticCurveTo(midX + 0.01, midY + 0.02, 0, 0);
                    
                    const frondGeo = new THREE.ShapeGeometry(frondShape);
                    const frond = new THREE.Mesh(frondGeo, jungleMat);
                    frond.position.set(0.04, 0.75, 0);
                    palm.add(frond);
                }
                
                // Coconuts
                const coconutGeo = new THREE.CircleGeometry(0.03, 8);
                for (let i = 0; i < 3; i++) {
                    const coconut = new THREE.Mesh(coconutGeo, jungleMat);
                    coconut.position.set(0.04 + (i - 1) * 0.04, 0.7, 0.01);
                    palm.add(coconut);
                }
                
                palm.scale.setScalar(0.01); // Start tiny
                palm.position.set(x, palm.userData.baseY, palm.userData.baseZ);
                palm.visible = false;
                
                return palm;
            }
            
            // Create BIG animated palms that pop forward dramatically
            const animPalm1 = createAnimatedPalm(-0.55, 1.7, 0);     // Left
            const animPalm2 = createAnimatedPalm(0.6, 1.9, 200);     // Right
            const animPalm3 = createAnimatedPalm(-0.3, 1.4, 400);    // Center-left
            const animPalm4 = createAnimatedPalm(0.35, 1.5, 300);    // Center-right
            
            window.palmTrees = [animPalm1, animPalm2, animPalm3, animPalm4];
            window.palmTrees.forEach(p => door1Scene.add(p));
            
            window.jungleAnimStart = 0;
        }
        
        function renderDoor1Frame() {
            if (!door1Renderer) return;
            
            const time = Date.now();
            const doorBaseX = -0.7;
            
            // Animation phases
            if (door1AnimPhase === 'shake') {
                const elapsed = time - door1AnimStart;
                if (elapsed < 600) {
                    const intensity = Math.sin(elapsed * 0.06) * 0.015 * (1 - elapsed / 600);
                    door1Group.rotation.z = intensity;
                    door1Group.position.x = doorBaseX + Math.sin(elapsed * 0.1) * 0.008;
                } else {
                    door1Group.rotation.z = 0;
                    door1Group.position.x = doorBaseX;
                    door1AnimPhase = 'unlock';
                    door1AnimStart = time;
                }
            } else if (door1AnimPhase === 'unlock') {
                const elapsed = time - door1AnimStart;
                if (elapsed < 400) {
                    const progress = elapsed / 400;
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    door1ShackleGroup.rotation.z = easeOut * 0.7;
                    door1ShackleGroup.position.y = easeOut * 0.08;
                } else {
                    door1AnimPhase = 'fall';
                    door1AnimStart = time;
                    door1IsLocked = false;
                }
            } else if (door1AnimPhase === 'fall') {
                const elapsed = time - door1AnimStart;
                if (elapsed < 300) {
                    const progress = elapsed / 300;
                    door1LockGroup.position.y = -0.15 - progress * 1.5;
                    door1LockGroup.rotation.x = progress * 0.8;
                    door1LockGroup.rotation.z = progress * 0.4;
                } else {
                    door1LockGroup.visible = false;
                    door1AnimPhase = 'swing';
                    door1AnimStart = time;
                }
            } else if (door1AnimPhase === 'swing') {
                const elapsed = time - door1AnimStart;
                if (elapsed < 800) {
                    const progress = elapsed / 800;
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    const bounce = Math.sin(progress * Math.PI * 2) * 0.04 * (1 - progress);
                    door1Group.rotation.y = (easeOut + bounce) * -1.2;
                    
                    // Show sky backdrop once door is partially open (20%)
                    if (progress > 0.2 && window.skyPlane) {
                        window.skyPlane.visible = true;
                    }
                    
                    // Start jungle animation when door is 40% open
                    if (progress > 0.4 && window.jungleAnimStart === 0) {
                        window.jungleAnimStart = time;
                    }
                } else {
                    door1Group.rotation.y = -1.2;
                    door1AnimPhase = 'open';
                    if (window.jungleAnimStart === 0) {
                        window.jungleAnimStart = time;
                    }
                }
            }
            
            // Animate trees popping forward (runs during swing and open phases)
            if (window.jungleAnimStart > 0 && window.palmTrees) {
                const jungleElapsed = time - window.jungleAnimStart;
                
                window.palmTrees.forEach((tree, i) => {
                    const treeElapsed = jungleElapsed - tree.userData.delay;
                    
                    if (treeElapsed > 0) {
                        tree.visible = true;
                        const popDuration = 800; // Each tree takes 800ms to pop out
                        const progress = Math.min(treeElapsed / popDuration, 1);
                        
                        // Elastic/bouncy easing for lazy pop effect
                        let ease;
                        if (progress < 1) {
                            const t = progress;
                            ease = 1 - Math.pow(1 - t, 3) * Math.cos(t * Math.PI * 1.5) * (1 - t);
                            ease = Math.min(1.1, ease);
                        } else {
                            ease = 1;
                        }
                        
                        // Animate Z position (pop forward out of the door)
                        if (tree.userData.baseZ !== undefined) {
                            tree.position.z = tree.userData.baseZ + (tree.userData.targetZ - tree.userData.baseZ) * Math.min(ease, 1);
                        }
                        
                        // Animate Y position (pop up slightly)
                        tree.position.y = tree.userData.baseY + (tree.userData.targetY - tree.userData.baseY) * Math.min(ease, 1);
                        
                        // Animate scale (grow from tiny)
                        const scaleEase = 1 - Math.pow(1 - Math.min(progress, 1), 2);
                        tree.scale.setScalar(tree.userData.targetScale * scaleEase);
                        
                        // Gentle sway once popped
                        if (progress >= 1) {
                            tree.rotation.z = Math.sin(time * 0.0015 + i * 1.5) * 0.03;
                        }
                    }
                });
                
                // Animate birds after trees
                if (window.birds && window.birds.length > 0) {
                    window.birds.forEach((bird, i) => {
                        const birdElapsed = jungleElapsed - bird.userData.delay;
                        
                        if (birdElapsed > 0) {
                            bird.visible = true;
                            const t = birdElapsed * 0.001 * bird.userData.speed;
                            
                            // Fly across the scene
                            bird.position.x = bird.userData.startX + Math.sin(t) * 0.4;
                            bird.position.y = bird.userData.startY + Math.sin(t * 1.3) * 0.15;
                            
                            // Wing flap
                            bird.children.forEach((wing, wi) => {
                                wing.rotation.z = (wi === 0 ? 1 : -1) * (0.3 + Math.sin(t * 15) * 0.25);
                            });
                        }
                    });
                }
            }
            
            // Idle glow pulse
            if (door1IsLocked && door1AnimPhase === 'idle') {
                const pulse = Math.sin(time * 0.004) * 0.15 + 0.85;
                door1GoldMat.emissiveIntensity = 0.25 * pulse;
            }
            
            door1Renderer.render(door1Scene, door1Camera);
            
            // Update sprite texture
            if (door1Texture) {
                door1Texture.needsUpdate = true;
            }
        }
        
        function resetDoor1Animation() {
            door1IsLocked = true;
            door1AnimPhase = 'idle';
            
            if (door1Group) {
                door1Group.rotation.y = 0;
                door1Group.rotation.z = 0;
                door1Group.position.x = -0.7;
            }
            if (door1ShackleGroup) {
                door1ShackleGroup.rotation.z = 0;
                door1ShackleGroup.position.y = 0;
            }
            if (door1LockGroup) {
                door1LockGroup.visible = true;
                door1LockGroup.position.y = -0.15;
                door1LockGroup.rotation.x = 0;
                door1LockGroup.rotation.z = 0;
            }
            if (window.palmTrees) {
                window.palmTrees.forEach(tree => {
                    tree.visible = false;
                    tree.position.y = tree.userData.baseY;
                    tree.scale.setScalar(0.01);
                    tree.rotation.z = 0;
                });
            }
            if (window.birds) {
                window.birds.forEach(bird => {
                    bird.visible = false;
                });
            }
            if (window.skyPlane) {
                window.skyPlane.visible = false;
            }
            window.jungleAnimStart = 0;
        }
        
        function triggerDoor1Animation() {
            if (door1AnimPhase !== 'idle' && door1AnimPhase !== 'open') return;
            
            if (door1AnimPhase === 'open') {
                // Reset if already open
                resetDoor1Animation();
                return;
            }
            
            door1AnimPhase = 'shake';
            door1AnimStart = Date.now();
        }

        // ================================================================
